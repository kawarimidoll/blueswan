name: Publish

on:
  workflow_dispatch:

concurrency:
  group: publish
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate CalVer tag
        id: calver
        run: |
          BASE=$(date +'%y.%m.%d')
          TAG="$BASE"
          SUFFIX=1
          while git tag | grep -qx "$TAG"; do
            TAG="$BASE-$SUFFIX"
            SUFFIX=$((SUFFIX + 1))
          done
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Commit version update
        id: version-commit
        run: |
          jq --arg v "$TAG" '.version = $v' manifest.json > manifest.tmp && mv manifest.tmp manifest.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          gh auth setup-git
          git add manifest.json
          git commit -m "chore(version): $TAG"
          git push
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.calver.outputs.tag }}

      - name: Create release
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | head -n 1)
          .github/scripts/generate-changelog.sh "$PREV_TAG" "$TAG" > changelog.md
          gh release create "$TAG" --target "$SHA" --title "$TAG" --notes-file changelog.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ steps.version-commit.outputs.sha }}
          TAG: ${{ steps.calver.outputs.tag }}
