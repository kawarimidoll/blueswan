name: Publish

on:
  workflow_dispatch:

concurrency:
  group: publish
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate CalVer tag
        id: calver
        run: |
          BASE=$(date +'%y.%m.%d')
          TAG="$BASE"
          SUFFIX=1
          while git tag | grep -qx "$TAG"; do
            TAG="$BASE-$SUFFIX"
            SUFFIX=$((SUFFIX + 1))
          done
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Update manifest.json version
        run: |
          TAG="${{ steps.calver.outputs.tag }}"
          jq --arg v "$TAG" '.version = $v' manifest.json > manifest.tmp && mv manifest.tmp manifest.json

      - name: Commit version update
        id: version-commit
        run: |
          TAG="${{ steps.calver.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "chore(version): $TAG"
          git push
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | head -n 1)
          TAG="${{ steps.calver.outputs.tag }}"
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          .github/scripts/generate-changelog.sh "$PREV_TAG" "$TAG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create release
        run: |
          TAG="${{ steps.calver.outputs.tag }}"
          gh release create "$TAG" --target "$SHA" --title "$TAG" --notes "$CHANGELOG"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ steps.version-commit.outputs.sha }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
