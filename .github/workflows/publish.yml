name: Publish

on:
  workflow_dispatch:

concurrency:
  group: publish
  cancel-in-progress: false

permissions: {}

jobs:
  publish:
    name: Publish release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read # checkout; writes go through the app token
    steps:
      - name: Generate app token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.BOT_CLIENT_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}
          permission-contents: write

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          persist-credentials: false

      - name: Generate CalVer tag
        id: calver
        run: |
          BASE=$(date +'%-y.%-m.%-d')
          TAG="$BASE"
          SUFFIX=1
          while git tag | grep -qx "$TAG"; do
            TAG="$BASE-$SUFFIX"
            SUFFIX=$((SUFFIX + 1))
          done
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Commit version update
        id: version-commit
        env:
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TAG: ${{ steps.calver.outputs.tag }}
        run: |
          jq --arg v "$TAG" '.version = $v' manifest.json > manifest.tmp && mv manifest.tmp manifest.json
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${APP_SLUG}[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add manifest.json
          git commit -m "chore(version): $TAG"
          git push
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SHA: ${{ steps.version-commit.outputs.sha }}
          TAG: ${{ steps.calver.outputs.tag }}
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | head -n 1)
          .github/scripts/generate-changelog.sh "$PREV_TAG" "$TAG" > changelog.md
          gh release create "$TAG" --target "$SHA" --title "$TAG" --notes-file changelog.md

      - name: Package extension
        run: zip -r blueswan.zip . -x '.git/*' '.github/*' '*.md' '.gitignore' '*.zip'

      - name: Publish to Chrome Web Store
        run: .github/scripts/publish-chrome.sh blueswan.zip
        env:
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}

      - name: Submit to AMO
        run: .github/scripts/publish-firefox.sh blueswan.zip
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
